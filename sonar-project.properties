# SonarQube / SonarCloud project configuration.
#
# Required CI secrets (Settings -> Secrets and variables -> Actions):
#   SONAR_TOKEN     - analysis token from your SonarQube/SonarCloud project
#   SONAR_HOST_URL  - https://sonarcloud.io  (SonarCloud) or your server URL
#
# For SonarCloud, also uncomment and set sonar.organization below.

sonar.projectKey=Zellione_obscura-safe-vault
sonar.projectName=Obscura-Safe-Vault
sonar.organization=zellione
sonar.host.url=https://sonarcloud.io

# What to analyse. Vendored third-party code and build outputs are excluded.
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.exclusions=vendor/**,build/**,bin/**,**/*.ninja
sonar.scm.provider=git

# C/C++ analysis consumes the compilation database emitted by the CI Ninja
# build (`ninja -t compdb`, see .github/workflows/ci.yml). Replaces the
# deprecated build-wrapper capture, whose downloaded binary version drifted
# out of sync with the CFamily analyzer.
sonar.cfamily.compile-commands=compile_commands.json

# Coverage: gcov .gcov files are generated by the CI job into the repo root.
# Modules without tests yet (Phases 3+) are excluded from the coverage metric
# so they don't drag new_coverage below the quality-gate threshold of 80%.
sonar.cfamily.gcov.reportsPath=.
sonar.coverage.exclusions=src/app/**,src/gfx/**,src/ui/**,src/platform/**,src/image/**
