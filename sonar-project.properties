# SonarQube / SonarCloud project configuration.
#
# Required CI secrets (Settings -> Secrets and variables -> Actions):
#   SONAR_TOKEN     - analysis token from your SonarQube/SonarCloud project
#   SONAR_HOST_URL  - https://sonarcloud.io  (SonarCloud) or your server URL
#
# For SonarCloud, also uncomment and set sonar.organization below.

sonar.projectKey=Zellione_obscura-safe-vault
sonar.projectName=Obscura-Safe-Vault
sonar.organization=zellione

# What to analyse. Vendored third-party code and build outputs are excluded.
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.exclusions=vendor/**,build/**,bin/**,**/*.ninja

# C/C++ analysis consumes the compilation database captured by the SonarSource
# build-wrapper during the CI build (see .github/workflows/ci.yml).
sonar.cfamily.build-wrapper-output=bw-output
