name: CI

on:
  # Run on PRs, and on pushes to main only (post-merge validation).
  # Feature-branch pushes are covered by the pull_request trigger, so this
  # avoids running the workflow twice for the same commit on an open PR.
  #
  # paths-ignore: skip the whole workflow when a push/PR touches *only* docs.
  # Any change that also touches a non-doc file (src/, tests/, scripts/,
  # premake5.lua, vendored submodules, this workflow, sonar config, …) still
  # runs the full matrix. This is a blocklist, not an allowlist, so new
  # build-relevant files are never accidentally excluded from CI.
  #
  # Safe because `main` has no required status checks — a skipped workflow
  # reports nothing and blocks nothing. If branch protection with required
  # checks is added later, switch to per-job gating (e.g. dorny/paths-filter)
  # so the required checks still report a (neutral/success) result.
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  schedule:
    - cron: '0 2 * * 0'

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.config }} / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'schedule'

    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        config: [Debug, Release]

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -----------------------------------------------------------------------
      # System packages + premake5 + vendored SDL3 (shared composite actions)
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        uses: ./.github/actions/setup-apt-deps
        with:
          cache-key-suffix: matrix
          extra-packages: gcc-14 clang

      - name: Setup premake5 + vendored SDL3
        uses: ./.github/actions/setup-premake-sdl3

      # -----------------------------------------------------------------------
      # Generate + compile
      # -----------------------------------------------------------------------
      - name: Use gcc-14 as default gcc
        if: matrix.compiler == 'gcc'
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      # -----------------------------------------------------------------------
      # Vendored image codecs (libwebp + HEIC/AVIF stack) + FFmpeg -> vendor/codecs-prefix.
      # Keyed on the submodule set (.gitmodules) AND scripts/build_codecs.{sh,bat}, so a
      # change to the codec/FFmpeg configure flags (e.g. enabling audio decoders) busts the
      # cache and forces a rebuild — build_codecs skips when the lib already exists.
      # -----------------------------------------------------------------------
      - name: Cache vendored codecs build
        uses: actions/cache@v4
        id: cache-codecs
        with:
          path: vendor/codecs-prefix
          key: codecs-v4-${{ runner.os }}-${{ hashFiles('.gitmodules', 'scripts/build_codecs.sh', 'scripts/build_codecs.bat') }}-${{ runner.arch }}

      - name: Build vendored codecs
        if: steps.cache-codecs.outputs.cache-hit != 'true'
        run: scripts/build_codecs.sh

      - name: Generate Ninja build files (${{ matrix.compiler }})
        run: bin/premake5 ninja --cc=${{ matrix.compiler }}

      - name: Build (${{ matrix.config }})
        run: ninja ${{ matrix.config }}_x64

      # -----------------------------------------------------------------------
      # Tests — crypto known-answer vectors + round-trip/tamper (Phase 1+).
      # The build step above already compiles the osv_tests target.
      # -----------------------------------------------------------------------
      - name: Run tests (${{ matrix.config }})
        run: ./build/bin/${{ matrix.config }}/osv_tests

      # -----------------------------------------------------------------------
      # Upload artefact (Debug binary only, to keep storage low)
      # -----------------------------------------------------------------------
      - name: Upload build artefact
        if: matrix.config == 'Debug' && matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: osv-linux-debug
          path: build/bin/Debug/osv
          retention-days: 7

      # -----------------------------------------------------------------------
      # Packaging (Release leg only) — tar.gz with install.sh
      # -----------------------------------------------------------------------
      - name: Package (tar.gz)
        if: matrix.config == 'Release' && matrix.compiler == 'gcc'
        run: scripts/package.sh

      - name: Upload package
        if: matrix.config == 'Release' && matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: osv-linux-tarball
          path: dist/*.tar.gz
          retention-days: 7

  # ===========================================================================
  # Windows — MSVC via premake vs2022 + MSBuild. The vendored SDL3 static lib
  # is cmake-built with Ninja (cl on PATH via msvc-dev-cmd) and lands at
  # vendor/SDL3/build/SDL3-static.lib, which premake's link_sdl3() picks up.
  # ===========================================================================
  windows:
    name: MSVC / ${{ matrix.config }} / Windows
    # Pinned to windows-2022 (VS 2022 — the toolchain this project targets, see
    # CLAUDE.md). The newer windows-latest image (VS 18 / MSVC 14.51) miscompiles
    # a freshly-built vendored lib (SDL3/codecs) in Release, crashing osv_tests;
    # main only masks it via a stale build cache. Phase 15 (PR1) surfaced it by
    # busting the cache (adding vendor/ffmpeg changed .gitmodules, which is in the
    # SDL3 + codec cache keys). Revisit when the newer image's MSVC is fixed.
    runs-on: windows-2022
    if: github.event_name != 'schedule'

    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # nasm is required to build libaom (Stage B); not preinstalled on the runner.
      - name: Install nasm
        shell: pwsh
        run: |
          choco install nasm --no-progress -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # FFmpeg's ./configure needs a POSIX shell + standard unix tools; MSVC
      # itself (cl/link/lib) still does the actual compiling via
      # --toolchain=msvc. path-type: inherit carries the MSVC env (from
      # msvc-dev-cmd above) and nasm's PATH entry into the MSYS2 shell.
      # pkgconf: configure's --enable-libaom (Phase 40, AV1 software decode)
      # detects libaom via pkg-config against the aom.pc build_codecs.bat
      # installs into vendor/codecs-prefix.
      - name: Set up MSYS2 (for FFmpeg build)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          path-type: inherit
          install: make diffutils pkgconf

      # MSYS2 ships its own coreutils link.exe (a symlink tool) in /usr/bin,
      # which shadows MSVC's link.exe on PATH — rename it out of the way so
      # FFmpeg's --toolchain=msvc build finds the real linker.
      - name: Hide MSYS2's link.exe (avoid MSVC link.exe collision)
        shell: msys2 {0}
        run: |
          if [ -f /usr/bin/link.exe ]; then
            mv /usr/bin/link.exe /usr/bin/link.exe.msys2-bak
          fi

      - name: Cache premake5 binary
        uses: actions/cache@v4
        id: cache-premake5
        with:
          path: bin/premake5.exe
          key: premake5-5.0.0-beta8-windows

      - name: Download premake5
        if: steps.cache-premake5.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          curl.exe -fsSL "https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-windows.zip" -o "$env:TEMP\premake5.zip"
          tar -xf "$env:TEMP\premake5.zip" -C bin

      - name: Cache vendored SDL3 build
        uses: actions/cache@v4
        id: cache-sdl3
        with:
          path: vendor/SDL3/build
          # Cache key includes the toolchain tag (win2022) so a runner-image /
          # MSVC change rebuilds the static libs with the matching compiler.
          # Without it, libs built by one MSVC get linked into an app built by
          # another → ABI mismatch / static-init crash (Phase 15 PR1).
          key: sdl3-win2022-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored SDL3
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S vendor/SDL3 -B vendor/SDL3/build `
            -DCMAKE_BUILD_TYPE=Release `
            -DSDL_STATIC=ON -DSDL_SHARED=OFF `
            -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF -DSDL_INSTALL_TESTS=OFF `
            -G "Ninja"
          cmake --build vendor/SDL3/build --parallel

      - name: Cache vendored codecs build
        uses: actions/cache@v4
        id: cache-codecs
        with:
          path: vendor/codecs-prefix
          # win2022 toolchain tag — see the SDL3 cache key note above. Bumped
          # to v5 (from v4): the key previously hashed only .gitmodules, so a
          # decoder-flag-only change to build_codecs.bat / build_ffmpeg_windows.sh
          # (e.g. Phase 38's vp8/vp9 addition) silently reused a stale prefix —
          # mirror the Linux leg's key, which already hashes its build scripts.
          key: codecs-v5-${{ runner.os }}-win2022-${{ hashFiles('.gitmodules', 'scripts/build_codecs.bat', 'scripts/build_ffmpeg_windows.sh') }}-${{ runner.arch }}

      - name: Build vendored codecs
        if: steps.cache-codecs.outputs.cache-hit != 'true'
        shell: cmd
        run: scripts\build_codecs.bat

      # Decode-only static FFmpeg, built separately from build_codecs.bat since
      # it needs FFmpeg's own configure/make (not cmake) — see
      # scripts/build_ffmpeg_windows.sh for the --toolchain=msvc details.
      - name: Build vendored FFmpeg (Windows, MSVC toolchain)
        if: steps.cache-codecs.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: scripts/build_ffmpeg_windows.sh

      - name: Generate VS2022 solution
        run: bin\premake5.exe vs2022

      - name: Build (${{ matrix.config }})
        run: msbuild ObscuraSafeVault.sln /m "/p:Configuration=${{ matrix.config }}" /p:Platform=x64

      - name: Run tests (${{ matrix.config }})
        env:
          SDL_VIDEODRIVER: dummy
        run: ./build/bin/${{ matrix.config }}/osv_tests.exe

      # -----------------------------------------------------------------------
      # Packaging (Release leg only) — portable zip, same script the Release
      # workflow runs (there with the tag's version instead of "dev").
      # -----------------------------------------------------------------------
      - name: Package (portable zip)
        if: matrix.config == 'Release'
        shell: pwsh
        env:
          OSV_VERSION: dev
        run: scripts\package.ps1

      - name: Upload package
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: osv-windows-zip
          path: dist/*.zip
          retention-days: 7

  # ===========================================================================
  # Sanitiser gate — builds and runs the full test suite under ASAN + UBSan +
  # LSan. Enforces the Phase 1 acceptance criterion ("no leaks; mlock handled
  # gracefully") on every PR. As of Phase 4 the osv_tests target links the
  # headless-testable gfx units, so this job provisions the vendored SDL3 build
  # (shared cache with the build-and-test job).
  # ===========================================================================
  tests-asan:
    name: ASAN+UBSan / tests / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        uses: ./.github/actions/setup-apt-deps
        with:
          cache-key-suffix: asan

      - name: Use gcc-14 as default gcc
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Setup premake5 + vendored SDL3
        uses: ./.github/actions/setup-premake-sdl3

      # Build the decoders too: running libwebp/libheif/libaom under ASAN+UBSan on
      # untrusted input is the highest-value place to have the sanitisers.
      - name: Cache vendored codecs build
        uses: actions/cache@v4
        id: cache-codecs
        with:
          path: vendor/codecs-prefix
          key: codecs-v4-${{ runner.os }}-${{ hashFiles('.gitmodules', 'scripts/build_codecs.sh', 'scripts/build_codecs.bat') }}-${{ runner.arch }}

      - name: Build vendored codecs
        if: steps.cache-codecs.outputs.cache-hit != 'true'
        run: scripts/build_codecs.sh

      - name: Generate Ninja build files (--asan)
        run: bin/premake5 --asan ninja --cc=gcc

      - name: Build osv_tests (ASAN)
        run: ninja osv_tests_Debug_x64

      - name: Run tests under ASAN + UBSan + LSan
        env:
          # gfx tests use SDL's software renderer; force a headless video driver
          # so SDL never tries to open a display on the CI runner.
          SDL_VIDEODRIVER: dummy
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ./build/bin/Debug/osv_tests

  # ===========================================================================
  # ThreadSanitizer gate — builds and runs the full test suite under TSan.
  # Phase 42: catches data races in media::VideoDecodeWorker (Phase 41) and
  # any future concurrent code. Unlike the ASAN leg above, this job does NOT
  # rebuild the vendored codecs/SDL3 under TSan instrumentation — it links
  # the same plain vendor/codecs-prefix / vendor/SDL3/build every other job
  # already builds and caches. TSan's job here is catching races in our own
  # threading code (worker queues, mutexes, atomics), which lives entirely in
  # src/ and tests/; it does not need the codec libraries' own internals
  # instrumented, unlike ASAN's untrusted-input-parsing concern above.
  # ===========================================================================
  tests-tsan:
    name: ThreadSanitizer / tests / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        uses: ./.github/actions/setup-apt-deps
        with:
          cache-key-suffix: tsan

      - name: Use gcc-14 as default gcc
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Setup premake5 + vendored SDL3
        uses: ./.github/actions/setup-premake-sdl3

      # Reuses the same plain (non-instrumented) codec build every other job
      # builds and caches under this key — see the job-level comment above for
      # why this job does not need its own TSan-instrumented codec prefix.
      - name: Cache vendored codecs build
        uses: actions/cache@v4
        id: cache-codecs
        with:
          path: vendor/codecs-prefix
          key: codecs-v4-${{ runner.os }}-${{ hashFiles('.gitmodules', 'scripts/build_codecs.sh', 'scripts/build_codecs.bat') }}-${{ runner.arch }}

      - name: Build vendored codecs
        if: steps.cache-codecs.outputs.cache-hit != 'true'
        run: scripts/build_codecs.sh

      - name: Generate Ninja build files (--tsan)
        run: bin/premake5 --tsan ninja --cc=gcc

      - name: Build osv_tests (TSan)
        run: ninja osv_tests_Debug_x64

      - name: Run tests under ThreadSanitizer
        env:
          # gfx tests use SDL's software renderer; force a headless video driver
          # so SDL never tries to open a display on the CI runner.
          SDL_VIDEODRIVER: dummy
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: ./build/bin/Debug/osv_tests

  # ===========================================================================
  # ASAN+UBSan codecs — fuzz test + ASAN-instrumented codec builds.
  # Triggered only on workflow_dispatch (manual) or weekly schedule, not per-PR.
  # Tests the deterministic codec fuzz suite (test_fuzz_codecs.cpp) with
  # ASAN-instrumented WebP/HEIC/AVIF/video decoders to catch memory errors in
  # vendored codec parsers on malformed input.
  # ===========================================================================
  tests-asan-codecs:
    name: ASAN+UBSan / tests-asan-codecs / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # Only run on manual workflow_dispatch or weekly schedule, not per-PR.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        uses: ./.github/actions/setup-apt-deps
        with:
          cache-key-suffix: asan-codecs

      - name: Use gcc-14 as default gcc
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Setup premake5 + vendored SDL3
        uses: ./.github/actions/setup-premake-sdl3

      # Build ASAN-instrumented codecs with a separate cache key (-asan suffix).
      - name: Cache ASAN vendored codecs build
        uses: actions/cache@v4
        id: cache-codecs-asan
        with:
          path: vendor/codecs-prefix-asan
          key: codecs-asan-${{ runner.os }}-${{ hashFiles('.gitmodules', 'scripts/build_codecs.sh', 'scripts/build_codecs.bat') }}-${{ runner.arch }}

      - name: Build ASAN-instrumented vendored codecs
        if: steps.cache-codecs-asan.outputs.cache-hit != 'true'
        run: scripts/build_codecs.sh --asan

      - name: Generate Ninja build files (--asan)
        run: bin/premake5 --asan ninja --cc=gcc

      - name: Build osv_tests (ASAN + instrumented codecs)
        run: ninja osv_tests_Debug_x64

      - name: Run codec fuzz tests under ASAN + UBSan + LSan
        env:
          # gfx tests use SDL's software renderer; force a headless video driver
          # so SDL never tries to open a display on the CI runner.
          SDL_VIDEODRIVER: dummy
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ./build/bin/Debug/osv_tests

  # ===========================================================================
  # SonarQube analysis — static analysis of src/ via the compilation database
  # (compile_commands.json) emitted by the real Ninja build of the osv target.
  #
  # Requires one repository secret; without SONAR_TOKEN every step is skipped
  # so the job stays green until analysis is configured:
  #   SONAR_TOKEN  - project analysis token (Settings → Secrets → Actions)
  # The host URL is hardcoded to https://sonarcloud.io in sonar-project.properties.
  # ===========================================================================
  sonarqube:
    name: SonarQube analysis / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'schedule'

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Skip notice (no SONAR_TOKEN configured)
        if: env.SONAR_TOKEN == ''
        run: |
          echo "::notice::SONAR_TOKEN is not set — skipping SonarQube analysis."
          echo "Add the SONAR_TOKEN repository secret to enable it."

      # Full history so Sonar can attribute new-code and blame accurately.
      - name: Checkout (full history + submodules)
        if: env.SONAR_TOKEN != ''
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache apt packages
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@v4
        with:
          path: /tmp/apt-cache
          key: apt-sonar-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-sonar-

      - name: Install build dependencies
        if: env.SONAR_TOKEN != ''
        run: |
          # CI's apt mirror occasionally hangs the connection indefinitely; bound
          # each fetch (30s) and retry so a stuck mirror fails fast instead of
          # hanging the whole job. Backed by the job-level timeout-minutes too.
          # Cache the downloaded .debs in /tmp/apt-cache (Dir::Cache::archives +
          # Keep-Downloaded-Packages) so repeat runs skip the slow apt download.
          # 1777 lets apt's _apt sandbox user write into the restored cache dir.
          sudo mkdir -p /tmp/apt-cache/partial
          sudo chmod -R 1777 /tmp/apt-cache
          printf 'Acquire::Retries "3";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\nDir::Cache::archives "/tmp/apt-cache";\nBinary::apt::APT::Keep-Downloaded-Packages "true";\n' \
            | sudo tee /etc/apt/apt.conf.d/99-osv-ci-timeout >/dev/null
          # The runner image ships Microsoft/Azure apt repos we don't use; they
          # intermittently 403, which fails `apt-get update` (exit 100) and kills
          # the whole step. Drop them first — none of our build deps come from them.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            nasm \
            g++-14 \
            unzip \
            curl \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxss-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libasound2-dev \
            libpulse-dev
          # apt re-creates partial/ and lock owned by the _apt user (mode 700/640)
          # during install; make the cache dir readable so the (non-root) runner
          # can tar it in the post-save step (otherwise the save fails silently).
          sudo chmod -R a+rX /tmp/apt-cache

      - name: Cache premake5 binary
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@v4
        id: cache-premake5
        with:
          path: bin/premake5
          key: premake5-5.0.0-beta8-linux

      - name: Download premake5
        if: env.SONAR_TOKEN != '' && steps.cache-premake5.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL \
            "https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-linux.tar.gz" \
            -o /tmp/premake5.tar.gz
          tar -xzf /tmp/premake5.tar.gz -C bin/
          chmod +x bin/premake5

      - name: Cache vendored SDL3 build
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@v4
        id: cache-sdl3
        with:
          path: vendor/SDL3/build
          key: sdl3-linux-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored SDL3
        if: env.SONAR_TOKEN != '' && steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          cmake -S vendor/SDL3 -B vendor/SDL3/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_STATIC=ON            \
            -DSDL_SHARED=OFF           \
            -DSDL_TESTS=OFF            \
            -DSDL_EXAMPLES=OFF         \
            -DSDL_INSTALL_TESTS=OFF    \
            -DSDL_X11_XTEST=OFF        \
            -DSDL_JOYSTICK=OFF         \
            -DSDL_HAPTIC=OFF           \
            -DSDL_SENSOR=OFF           \
            -DSDL_CAMERA=OFF           \
            -G "Ninja"
          cmake --build vendor/SDL3/build --parallel "$(nproc)"

      - name: Use gcc-14 as default gcc
        if: env.SONAR_TOKEN != ''
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      # osv links the image codecs, so the analysed compile below needs them.
      - name: Cache vendored codecs build
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@v4
        id: cache-codecs
        with:
          path: vendor/codecs-prefix
          key: codecs-v4-${{ runner.os }}-${{ hashFiles('.gitmodules', 'scripts/build_codecs.sh', 'scripts/build_codecs.bat') }}-${{ runner.arch }}

      - name: Build vendored codecs
        if: env.SONAR_TOKEN != '' && steps.cache-codecs.outputs.cache-hit != 'true'
        run: scripts/build_codecs.sh

      - name: Generate Ninja build files (gcc, with coverage)
        if: env.SONAR_TOKEN != ''
        run: bin/premake5 --coverage ninja --cc=gcc

      # Build the full osv target and emit the compilation database consumed by
      # Sonar's CFamily analyzer (sonar.cfamily.compile-commands) — same command
      # scripts/gen.sh uses for clangd. Replaces the deprecated build-wrapper,
      # whose downloaded binary drifted out of sync with the analyzer version.
      # Coverage flags are baked into the build, so .gcno files are emitted.
      - name: Build + write compile_commands.json
        if: env.SONAR_TOKEN != ''
        run: |
          ninja Debug_x64
          ninja -t compdb > compile_commands.json

      # Running the tests produces .gcda files alongside the .gcno files.
      - name: Run tests (generates .gcda coverage data)
        if: env.SONAR_TOKEN != ''
        run: ./build/bin/Debug/osv_tests

      # Convert .gcda/.gcno pairs into .gcov files that SonarCFamily can read.
      # --preserve-paths keeps path info so Sonar maps lines back to sources.
      - name: Collect gcov coverage reports
        if: env.SONAR_TOKEN != ''
        run: |
          find build/obj/Debug/osv_tests -name '*.gcda' \
            | xargs gcov --preserve-paths 2>/dev/null || true

      # GITHUB_TOKEN lets SonarCloud post inline PR comments and status checks.
      - name: SonarQube scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Linting — clang-format (dry-run) + clang-tidy (non-blocking).
  # Runs on PRs only, reuses setup from build-and-test (minimal cost).
  # continue-on-error: true so lint findings don't block the workflow.
  # ===========================================================================
  lint:
    name: Lint / clang-format + clang-tidy / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    continue-on-error: true

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /tmp/apt-cache
          key: apt-lint-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-lint-

      - name: Install build dependencies (clang + ninja for compile_commands.json)
        run: |
          sudo mkdir -p /tmp/apt-cache/partial
          sudo chmod -R 1777 /tmp/apt-cache
          printf 'Acquire::Retries "3";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\nDir::Cache::archives "/tmp/apt-cache";\nBinary::apt::APT::Keep-Downloaded-Packages "true";\n' \
            | sudo tee /etc/apt/apt.conf.d/99-osv-ci-timeout >/dev/null
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            clang-format \
            clang-tidy \
            gcc-14 \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxss-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libasound2-dev \
            libpulse-dev
          sudo chmod -R a+rX /tmp/apt-cache

      - name: Cache premake5 binary
        uses: actions/cache@v4
        id: cache-premake5
        with:
          path: bin/premake5
          key: premake5-5.0.0-beta8-linux

      - name: Download premake5
        if: steps.cache-premake5.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL \
            "https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-linux.tar.gz" \
            -o /tmp/premake5.tar.gz
          tar -xzf /tmp/premake5.tar.gz -C bin/
          chmod +x bin/premake5

      - name: Cache vendored SDL3 build
        uses: actions/cache@v4
        id: cache-sdl3
        with:
          path: vendor/SDL3/build
          key: sdl3-linux-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored SDL3
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          cmake -S vendor/SDL3 -B vendor/SDL3/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_STATIC=ON            \
            -DSDL_SHARED=OFF           \
            -DSDL_TESTS=OFF            \
            -DSDL_EXAMPLES=OFF         \
            -DSDL_INSTALL_TESTS=OFF    \
            -DSDL_X11_XTEST=OFF        \
            -DSDL_JOYSTICK=OFF         \
            -DSDL_HAPTIC=OFF           \
            -DSDL_SENSOR=OFF           \
            -DSDL_CAMERA=OFF           \
            -G "Ninja"
          cmake --build vendor/SDL3/build --parallel "$(nproc)"

      - name: Use gcc-14 as default gcc
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Generate Ninja build files (for compile_commands.json)
        run: bin/premake5 ninja --cc=gcc

      - name: clang-format --diff (changed lines only)
        run: |
          # For PR events, check against the merge base. For push events (main),
          # fall back to HEAD~1. This ensures we only enforce style on new/changed
          # code, not the entire tree (which has hand-aligned struct members
          # incompatible with automated reformatting).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD~1"
          fi
          git clang-format --diff "$BASE" -- src/ tests/ || true

      - name: clang-tidy (src/)
        run: |
          find src -type f -name "*.cpp" \
            -exec clang-tidy -p . {} + 2>&1 | tee /tmp/clang-tidy-output.txt
          # Extract summary line
          grep -E "warning:|error:" /tmp/clang-tidy-output.txt | head -20 || true
          echo "---"
          echo "Total issues found: $(grep -c -E "warning:|error:" /tmp/clang-tidy-output.txt || echo 0)"
