name: CI

on:
  # Run on PRs, and on pushes to main only (post-merge validation).
  # Feature-branch pushes are covered by the pull_request trigger, so this
  # avoids running the workflow twice for the same commit on an open PR.
  #
  # paths-ignore: skip the whole workflow when a push/PR touches *only* docs.
  # Any change that also touches a non-doc file (src/, tests/, scripts/,
  # premake5.lua, vendored submodules, this workflow, sonar config, …) still
  # runs the full matrix. This is a blocklist, not an allowlist, so new
  # build-relevant files are never accidentally excluded from CI.
  #
  # Safe because `main` has no required status checks — a skipped workflow
  # reports nothing and blocks nothing. If branch protection with required
  # checks is added later, switch to per-job gating (e.g. dorny/paths-filter)
  # so the required checks still report a (neutral/success) result.
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.config }} / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        config: [Debug, Release]

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -----------------------------------------------------------------------
      # System packages
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          # CI's apt mirror occasionally hangs the connection indefinitely; bound
          # each fetch (30s) and retry so a stuck mirror fails fast instead of
          # hanging the whole job. Backed by the job-level timeout-minutes too.
          printf 'Acquire::Retries "3";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\n' \
            | sudo tee /etc/apt/apt.conf.d/99-osv-ci-timeout >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            nasm \
            gcc-14 \
            g++-14 \
            clang \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxss-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libasound2-dev \
            libpulse-dev

      # -----------------------------------------------------------------------
      # premake5 binary
      # -----------------------------------------------------------------------
      - name: Cache premake5 binary
        uses: actions/cache@v4
        id: cache-premake5
        with:
          path: bin/premake5
          key: premake5-5.0.0-beta8-linux

      - name: Download premake5
        if: steps.cache-premake5.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL \
            "https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-linux.tar.gz" \
            -o /tmp/premake5.tar.gz
          tar -xzf /tmp/premake5.tar.gz -C bin/
          chmod +x bin/premake5

      # -----------------------------------------------------------------------
      # Vendored SDL3 static build (cached by submodule commit hash)
      # -----------------------------------------------------------------------
      - name: Cache vendored SDL3 build
        uses: actions/cache@v4
        id: cache-sdl3
        with:
          path: vendor/SDL3/build
          key: sdl3-linux-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored SDL3
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          cmake -S vendor/SDL3 -B vendor/SDL3/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_STATIC=ON            \
            -DSDL_SHARED=OFF           \
            -DSDL_TESTS=OFF            \
            -DSDL_EXAMPLES=OFF         \
            -DSDL_INSTALL_TESTS=OFF    \
            -DSDL_X11_XTEST=OFF        \
            -DSDL_JOYSTICK=OFF         \
            -DSDL_HAPTIC=OFF           \
            -DSDL_SENSOR=OFF           \
            -DSDL_CAMERA=OFF           \
            -G "Ninja"
          cmake --build vendor/SDL3/build --parallel "$(nproc)"

      # -----------------------------------------------------------------------
      # Generate + compile
      # -----------------------------------------------------------------------
      - name: Use gcc-14 as default gcc
        if: matrix.compiler == 'gcc'
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      # -----------------------------------------------------------------------
      # Vendored image codecs (libwebp + HEIC/AVIF stack) -> vendor/codecs-prefix
      # (cached by submodule commit hash, like SDL3).
      # -----------------------------------------------------------------------
      - name: Cache vendored codecs build
        uses: actions/cache@v4
        id: cache-codecs
        with:
          path: vendor/codecs-prefix
          key: codecs-v3-${{ runner.os }}-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored codecs
        if: steps.cache-codecs.outputs.cache-hit != 'true'
        run: scripts/build_codecs.sh

      - name: Generate Ninja build files (${{ matrix.compiler }})
        run: bin/premake5 ninja --cc=${{ matrix.compiler }}

      - name: Build (${{ matrix.config }})
        run: ninja ${{ matrix.config }}_x64

      # -----------------------------------------------------------------------
      # Tests — crypto known-answer vectors + round-trip/tamper (Phase 1+).
      # The build step above already compiles the osv_tests target.
      # -----------------------------------------------------------------------
      - name: Run tests (${{ matrix.config }})
        run: ./build/bin/${{ matrix.config }}/osv_tests

      # -----------------------------------------------------------------------
      # Upload artefact (Debug binary only, to keep storage low)
      # -----------------------------------------------------------------------
      - name: Upload build artefact
        if: matrix.config == 'Debug' && matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: osv-linux-debug
          path: build/bin/Debug/osv
          retention-days: 7

      # -----------------------------------------------------------------------
      # Packaging (Release leg only) — tar.gz with install.sh
      # -----------------------------------------------------------------------
      - name: Package (tar.gz)
        if: matrix.config == 'Release' && matrix.compiler == 'gcc'
        run: scripts/package.sh

      - name: Upload package
        if: matrix.config == 'Release' && matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: osv-linux-tarball
          path: dist/*.tar.gz
          retention-days: 7

  # ===========================================================================
  # Windows — MSVC via premake vs2022 + MSBuild. The vendored SDL3 static lib
  # is cmake-built with Ninja (cl on PATH via msvc-dev-cmd) and lands at
  # vendor/SDL3/build/SDL3-static.lib, which premake's link_sdl3() picks up.
  # ===========================================================================
  windows:
    name: MSVC / ${{ matrix.config }} / Windows
    # Pinned to windows-2022 (VS 2022 — the toolchain this project targets, see
    # CLAUDE.md). The newer windows-latest image (VS 18 / MSVC 14.51) miscompiles
    # a freshly-built vendored lib (SDL3/codecs) in Release, crashing osv_tests;
    # main only masks it via a stale build cache. Phase 15 (PR1) surfaced it by
    # busting the cache (adding vendor/ffmpeg changed .gitmodules, which is in the
    # SDL3 + codec cache keys). Revisit when the newer image's MSVC is fixed.
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # nasm is required to build libaom (Stage B); not preinstalled on the runner.
      - name: Install nasm
        shell: pwsh
        run: |
          choco install nasm --no-progress -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache premake5 binary
        uses: actions/cache@v4
        id: cache-premake5
        with:
          path: bin/premake5.exe
          key: premake5-5.0.0-beta8-windows

      - name: Download premake5
        if: steps.cache-premake5.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          curl.exe -fsSL "https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-windows.zip" -o "$env:TEMP\premake5.zip"
          tar -xf "$env:TEMP\premake5.zip" -C bin

      - name: Cache vendored SDL3 build
        uses: actions/cache@v4
        id: cache-sdl3
        with:
          path: vendor/SDL3/build
          # Cache key includes the toolchain tag (win2022) so a runner-image /
          # MSVC change rebuilds the static libs with the matching compiler.
          # Without it, libs built by one MSVC get linked into an app built by
          # another → ABI mismatch / static-init crash (Phase 15 PR1).
          key: sdl3-win2022-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored SDL3
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S vendor/SDL3 -B vendor/SDL3/build `
            -DCMAKE_BUILD_TYPE=Release `
            -DSDL_STATIC=ON -DSDL_SHARED=OFF `
            -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF -DSDL_INSTALL_TESTS=OFF `
            -G "Ninja"
          cmake --build vendor/SDL3/build --parallel

      - name: Cache vendored codecs build
        uses: actions/cache@v4
        id: cache-codecs
        with:
          path: vendor/codecs-prefix
          # win2022 toolchain tag — see the SDL3 cache key note above.
          key: codecs-v3-${{ runner.os }}-win2022-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored codecs
        if: steps.cache-codecs.outputs.cache-hit != 'true'
        shell: cmd
        run: scripts\build_codecs.bat

      - name: Generate VS2022 solution
        run: bin\premake5.exe vs2022

      - name: Build (${{ matrix.config }})
        run: msbuild ObscuraSafeVault.sln /m "/p:Configuration=${{ matrix.config }}" /p:Platform=x64

      - name: Run tests (${{ matrix.config }})
        env:
          SDL_VIDEODRIVER: dummy
        run: ./build/bin/${{ matrix.config }}/osv_tests.exe

      # -----------------------------------------------------------------------
      # Packaging (Release leg only) — NSIS installer (installed via choco;
      # PATH doesn't refresh mid-job, so call makensis by its install path)
      # -----------------------------------------------------------------------
      - name: Package (NSIS installer)
        if: matrix.config == 'Release'
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /DVERSION=dev packaging\windows\osv.nsi

      - name: Upload package
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: osv-windows-installer
          path: dist/*.exe
          retention-days: 7

  # ===========================================================================
  # macOS — AppleClang via premake gmake2. Builds the native architecture
  # (arm64 on current runners); the vendored SDL3 is cmake-built natively too.
  # ===========================================================================
  macos:
    name: AppleClang / ${{ matrix.config }} / macOS
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Ninja + nasm are needed to cmake-build the vendored codecs (libaom's
      # assembly requires nasm); the macOS runner ships neither by default.
      - name: Install codec build tools
        run: brew install ninja nasm

      - name: Cache premake5 binary
        uses: actions/cache@v4
        id: cache-premake5
        with:
          path: bin/premake5
          key: premake5-5.0.0-beta8-macosx

      - name: Download premake5
        if: steps.cache-premake5.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL \
            "https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-macosx.tar.gz" \
            -o /tmp/premake5.tar.gz
          tar -xzf /tmp/premake5.tar.gz -C bin/
          chmod +x bin/premake5

      - name: Cache vendored SDL3 build
        uses: actions/cache@v4
        id: cache-sdl3
        with:
          path: vendor/SDL3/build
          key: sdl3-macos-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored SDL3
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          cmake -S vendor/SDL3 -B vendor/SDL3/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_STATIC=ON -DSDL_SHARED=OFF \
            -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF -DSDL_INSTALL_TESTS=OFF
          cmake --build vendor/SDL3/build --parallel 3

      - name: Cache vendored codecs build
        uses: actions/cache@v4
        id: cache-codecs
        with:
          path: vendor/codecs-prefix
          key: codecs-v3-${{ runner.os }}-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored codecs
        if: steps.cache-codecs.outputs.cache-hit != 'true'
        run: scripts/build_codecs.sh

      - name: Generate Makefiles
        run: bin/premake5 gmake2

      - name: Build (${{ matrix.config }})
        run: |
          CONFIG_LC="$(printf '%s' "${{ matrix.config }}" | tr '[:upper:]' '[:lower:]')"
          make config="${CONFIG_LC}_x64" -j3

      - name: Run tests (${{ matrix.config }})
        env:
          SDL_VIDEODRIVER: dummy
        run: ./build/bin/${{ matrix.config }}/osv_tests

      # -----------------------------------------------------------------------
      # Packaging (Release leg only) — ad-hoc-signed .app bundle, zipped
      # -----------------------------------------------------------------------
      - name: Package (.app bundle)
        if: matrix.config == 'Release'
        run: scripts/package_macos.sh

      - name: Upload package
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: osv-macos-app
          path: dist/*.zip
          retention-days: 7

  # ===========================================================================
  # Sanitiser gate — builds and runs the full test suite under ASAN + UBSan +
  # LSan. Enforces the Phase 1 acceptance criterion ("no leaks; mlock handled
  # gracefully") on every PR. As of Phase 4 the osv_tests target links the
  # headless-testable gfx units, so this job provisions the vendored SDL3 build
  # (shared cache with the build-and-test job).
  # ===========================================================================
  tests-asan:
    name: ASAN+UBSan / tests / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          # CI's apt mirror occasionally hangs the connection indefinitely; bound
          # each fetch (30s) and retry so a stuck mirror fails fast instead of
          # hanging the whole job. Backed by the job-level timeout-minutes too.
          printf 'Acquire::Retries "3";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\n' \
            | sudo tee /etc/apt/apt.conf.d/99-osv-ci-timeout >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            nasm \
            g++-14 \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxss-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libasound2-dev \
            libpulse-dev

      - name: Use gcc-14 as default gcc
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Cache premake5 binary
        uses: actions/cache@v4
        id: cache-premake5
        with:
          path: bin/premake5
          key: premake5-5.0.0-beta8-linux

      - name: Download premake5
        if: steps.cache-premake5.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL \
            "https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-linux.tar.gz" \
            -o /tmp/premake5.tar.gz
          tar -xzf /tmp/premake5.tar.gz -C bin/
          chmod +x bin/premake5

      - name: Cache vendored SDL3 build
        uses: actions/cache@v4
        id: cache-sdl3
        with:
          path: vendor/SDL3/build
          key: sdl3-linux-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored SDL3
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          cmake -S vendor/SDL3 -B vendor/SDL3/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_STATIC=ON            \
            -DSDL_SHARED=OFF           \
            -DSDL_TESTS=OFF            \
            -DSDL_EXAMPLES=OFF         \
            -DSDL_INSTALL_TESTS=OFF    \
            -DSDL_X11_XTEST=OFF        \
            -DSDL_JOYSTICK=OFF         \
            -DSDL_HAPTIC=OFF           \
            -DSDL_SENSOR=OFF           \
            -DSDL_CAMERA=OFF           \
            -G "Ninja"
          cmake --build vendor/SDL3/build --parallel "$(nproc)"

      # Build the decoders too: running libwebp/libheif/libaom under ASAN+UBSan on
      # untrusted input is the highest-value place to have the sanitisers.
      - name: Cache vendored codecs build
        uses: actions/cache@v4
        id: cache-codecs
        with:
          path: vendor/codecs-prefix
          key: codecs-v3-${{ runner.os }}-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored codecs
        if: steps.cache-codecs.outputs.cache-hit != 'true'
        run: scripts/build_codecs.sh

      - name: Generate Ninja build files (--asan)
        run: bin/premake5 --asan ninja --cc=gcc

      - name: Build osv_tests (ASAN)
        run: ninja osv_tests_Debug_x64

      - name: Run tests under ASAN + UBSan + LSan
        env:
          # gfx tests use SDL's software renderer; force a headless video driver
          # so SDL never tries to open a display on the CI runner.
          SDL_VIDEODRIVER: dummy
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ./build/bin/Debug/osv_tests

  # ===========================================================================
  # SonarQube analysis — static analysis of src/ via the SonarSource C/C++
  # build-wrapper, which captures the real compilation of the osv target.
  #
  # Requires one repository secret; without SONAR_TOKEN every step is skipped
  # so the job stays green until analysis is configured:
  #   SONAR_TOKEN  - project analysis token (Settings → Secrets → Actions)
  # The host URL is hardcoded to https://sonarcloud.io in sonar-project.properties.
  # ===========================================================================
  sonarqube:
    name: SonarQube analysis / Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      BUILD_WRAPPER_OUT_DIR: bw-output

    steps:
      - name: Skip notice (no SONAR_TOKEN configured)
        if: env.SONAR_TOKEN == ''
        run: |
          echo "::notice::SONAR_TOKEN is not set — skipping SonarQube analysis."
          echo "Add the SONAR_TOKEN repository secret to enable it."

      # Full history so Sonar can attribute new-code and blame accurately.
      - name: Checkout (full history + submodules)
        if: env.SONAR_TOKEN != ''
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        if: env.SONAR_TOKEN != ''
        run: |
          # CI's apt mirror occasionally hangs the connection indefinitely; bound
          # each fetch (30s) and retry so a stuck mirror fails fast instead of
          # hanging the whole job. Backed by the job-level timeout-minutes too.
          printf 'Acquire::Retries "3";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\n' \
            | sudo tee /etc/apt/apt.conf.d/99-osv-ci-timeout >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            nasm \
            g++-14 \
            unzip \
            curl \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxss-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libasound2-dev \
            libpulse-dev

      - name: Cache premake5 binary
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@v4
        id: cache-premake5
        with:
          path: bin/premake5
          key: premake5-5.0.0-beta8-linux

      - name: Download premake5
        if: env.SONAR_TOKEN != '' && steps.cache-premake5.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL \
            "https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-linux.tar.gz" \
            -o /tmp/premake5.tar.gz
          tar -xzf /tmp/premake5.tar.gz -C bin/
          chmod +x bin/premake5

      - name: Cache vendored SDL3 build
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@v4
        id: cache-sdl3
        with:
          path: vendor/SDL3/build
          key: sdl3-linux-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored SDL3
        if: env.SONAR_TOKEN != '' && steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          cmake -S vendor/SDL3 -B vendor/SDL3/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_STATIC=ON            \
            -DSDL_SHARED=OFF           \
            -DSDL_TESTS=OFF            \
            -DSDL_EXAMPLES=OFF         \
            -DSDL_INSTALL_TESTS=OFF    \
            -DSDL_X11_XTEST=OFF        \
            -DSDL_JOYSTICK=OFF         \
            -DSDL_HAPTIC=OFF           \
            -DSDL_SENSOR=OFF           \
            -DSDL_CAMERA=OFF           \
            -G "Ninja"
          cmake --build vendor/SDL3/build --parallel "$(nproc)"

      - name: Download SonarQube build-wrapper
        if: env.SONAR_TOKEN != ''
        run: |
          curl -fsSLo /tmp/build-wrapper.zip \
            "https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip"
          unzip -o /tmp/build-wrapper.zip -d /tmp/build-wrapper
          echo "/tmp/build-wrapper/build-wrapper-linux-x86" >> "$GITHUB_PATH"

      - name: Use gcc-14 as default gcc
        if: env.SONAR_TOKEN != ''
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      # osv links the image codecs, so the build-wrapper compile below needs them.
      - name: Cache vendored codecs build
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@v4
        id: cache-codecs
        with:
          path: vendor/codecs-prefix
          key: codecs-v3-${{ runner.os }}-${{ hashFiles('.gitmodules') }}-${{ runner.arch }}

      - name: Build vendored codecs
        if: env.SONAR_TOKEN != '' && steps.cache-codecs.outputs.cache-hit != 'true'
        run: scripts/build_codecs.sh

      - name: Generate Ninja build files (gcc, with coverage)
        if: env.SONAR_TOKEN != ''
        run: bin/premake5 --coverage ninja --cc=gcc

      # Build the full osv target under the wrapper so all of src/ is analysed.
      # Coverage flags are baked into the build, so .gcno files are emitted.
      - name: Build under build-wrapper
        if: env.SONAR_TOKEN != ''
        run: |
          build-wrapper-linux-x86-64 --out-dir "$BUILD_WRAPPER_OUT_DIR" \
            ninja Debug_x64

      # Running the tests produces .gcda files alongside the .gcno files.
      - name: Run tests (generates .gcda coverage data)
        if: env.SONAR_TOKEN != ''
        run: ./build/bin/Debug/osv_tests

      # Convert .gcda/.gcno pairs into .gcov files that SonarCFamily can read.
      # --preserve-paths keeps path info so Sonar maps lines back to sources.
      - name: Collect gcov coverage reports
        if: env.SONAR_TOKEN != ''
        run: |
          find build/obj/Debug/osv_tests -name '*.gcda' \
            | xargs gcov --preserve-paths 2>/dev/null || true

      # GITHUB_TOKEN lets SonarCloud post inline PR comments and status checks.
      - name: SonarQube scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
