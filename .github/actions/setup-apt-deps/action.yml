name: Install apt build dependencies (cached)
description: >
  Installs the native build dependencies shared by every Linux CI job that
  builds osv (cmake, ninja, nasm, SDL3's X11/Wayland/audio dev headers,
  etc.), with the apt package cache keyed and restored across runs.
inputs:
  cache-key-suffix:
    description: Distinguishes this job's apt cache from other jobs' (e.g. "matrix", "asan").
    required: true
  extra-packages:
    description: Additional apt packages appended to the common baseline (space-separated).
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /tmp/apt-cache
        key: apt-${{ inputs.cache-key-suffix }}-${{ hashFiles('.github/workflows/ci.yml') }}
        restore-keys: apt-${{ inputs.cache-key-suffix }}-

    - name: Install build dependencies
      shell: bash
      run: |
        # CI's apt mirror occasionally hangs the connection indefinitely; bound
        # each fetch (30s) and retry so a stuck mirror fails fast instead of
        # hanging the whole job. Backed by the job-level timeout-minutes too.
        # Cache the downloaded .debs in /tmp/apt-cache (Dir::Cache::archives +
        # Keep-Downloaded-Packages) so repeat runs skip the slow apt download.
        # 1777 lets apt's _apt sandbox user write into the restored cache dir.
        sudo mkdir -p /tmp/apt-cache/partial
        sudo chmod -R 1777 /tmp/apt-cache
        printf 'Acquire::Retries "3";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\nDir::Cache::archives "/tmp/apt-cache";\nBinary::apt::APT::Keep-Downloaded-Packages "true";\n' \
          | sudo tee /etc/apt/apt.conf.d/99-osv-ci-timeout >/dev/null
        # The runner image ships Microsoft/Azure apt repos we don't use; they
        # intermittently 403, which fails `apt-get update` (exit 100) and kills
        # the whole step. Drop them first — none of our build deps come from them.
        sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* 2>/dev/null || true
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          cmake \
          ninja-build \
          nasm \
          g++-14 \
          libgl1-mesa-dev \
          libx11-dev \
          libxext-dev \
          libxrandr-dev \
          libxcursor-dev \
          libxi-dev \
          libxss-dev \
          libxkbcommon-dev \
          libwayland-dev \
          wayland-protocols \
          libasound2-dev \
          libpulse-dev \
          ${{ inputs.extra-packages }}
        # apt re-creates partial/ and lock owned by the _apt user (mode 700/640)
        # during install; make the cache dir readable so the (non-root) runner
        # can tar it in the post-save step (otherwise the save fails silently).
        sudo chmod -R a+rX /tmp/apt-cache
